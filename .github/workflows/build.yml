name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 内核源码
        required: true
        type: choice
        options:
          - crdroidandroid
          - LineageOS
          - OnePlus12R-development
      kernel_branch:
        description: 内核源码分支
        required: false
        type: string
        default: ""
      ksu_type:
        description: KSU管理器
        required: true
        type: choice
        options:
          - None
          - KernelSU-Next
          - KowSU
          - ReSukiSU
          - ReSukiSU-Manual
      susfs:
        description: 启用SUSFS
        required: true
        type: boolean
        default: false
      enable_lto:
        description: 启用LTO优化
        required: true
        type: boolean
        default: false

env:
  LLVM: 1
  LLVM_IAS: 1
  USE_SCCACHE: 1
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_STAT_SIZE: 1000000
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

jobs:
  security-check:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.security.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Check for sensitive data
        id: security
        run: |
          echo "status=passed" >> $GITHUB_OUTPUT
          if grep -r "password\|secret\|token" --include="*.yml" --include="*.yaml" .github/ 2>/dev/null; then
            echo "::warning::Potential sensitive data found"
          fi

  build:
    needs: security-check
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        retry: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get build info
        id: build-info
        run: |
          echo "build_date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          echo "runner=$(hostname)" >> $GITHUB_OUTPUT
          echo "::notice::Build started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: bc bison build-essential cpio curl dwarves flex libssl-dev libelf-dev libdw-dev lz4 python3 git ccache patch unzip xz-utils
          version: 1.0

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "SCCACHE_STAT_SIZE=1000000" >> $GITHUB_ENV
          echo "SCCACHE_WRAPPER_START_DELAY=3" >> $GITHUB_ENV
          echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "SCCACHE=1" >> $GITHUB_ENV

      - name: Cache Git References
        uses: actions/cache@v5
        with:
          path: ~/.kernel-refs
          key: kernel-refs-${{ inputs.kernel_source }}-${{ inputs.kernel_branch }}
          restore-keys: |
            kernel-refs-${{ inputs.kernel_source }}-

      - name: Cache Patches
        uses: actions/cache@v5
        with:
          path: patches
          key: patches-${{ hashFiles('patches/*.patch') }}
          restore-keys: patches-

      - name: Clone Kernel Source
        id: clone
        run: |
          echo "::group::Clone kernel source"
          mkdir -p sm8550 sm8550-modules
          mkdir -p ~/.kernel-refs/${{ inputs.kernel_source }}
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            --reference ~/.kernel-refs/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550 \
            --dissociate \
            "https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550.git" sm8550 || \
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            "https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550.git" sm8550
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            "https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550-modules.git" sm8550-modules

          cd sm8550
          echo "Kernel commit: $(git log -1 --oneline)"
          echo "Kernel branch: $(git branch --show-current)"
          echo "::endgroup::"

      - name: Install KernelSU
        if: inputs.ksu_type != 'None'
        run: |
          echo "::group::Install KernelSU: ${{ inputs.ksu_type }}"
          cd sm8550
          case "${{ inputs.ksu_type }}" in
            KernelSU-Next)
              curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev_susfs/kernel/setup.sh | bash -s dev_susfs
              ;;
            KowSU)
              curl -LSs https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh | bash -s master
              ;;
            ReSukiSU)
              curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh | bash -s main
              ;;
            ReSukiSU-Manual)
              curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh | bash -s main
              if [ -f "${{ github.workspace }}/patches/resksu_manual_hooks.patch" ]; then
                cp "${{ github.workspace }}/patches/resksu_manual_hooks.patch" ./
                patch -p1 < resksu_manual_hooks.patch || echo "::warning::Patch apply failed"
              else
                echo "::warning::resksu_manual_hooks.patch not found"
              fi
              ;;
          esac
          echo "::endgroup::"

      - name: Install SUSFS
        if: inputs.susfs
        run: |
          echo "::group::Install SUSFS"
          cd sm8550
          git clone --depth=1 -b gki-android13-5.15 https://gitlab.com/simonpunk/susfs4ksu.git susfs
          cp susfs/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch ./
          cp susfs/kernel_patches/fs/* fs/
          cp susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_gki-android13-5.15.patch || echo "::warning::SUSFS patch may already applied"
          touch .scmversion
          rm -rf susfs
          echo "::endgroup::"

      - name: Get Kernel Commit
        id: kernel-commit
        run: |
          echo "hash=$(cd sm8550 && git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(cd sm8550 && git log -1 --format='%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Cache Build Output
        uses: actions/cache@v5
        with:
          path: sm8550/out
          key: kernel-out-${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ inputs.susfs }}-${{ steps.kernel-commit.outputs.hash }}
          restore-keys: |
            kernel-out-${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ inputs.susfs }}-
            kernel-out-${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-
            kernel-out-${{ inputs.kernel_source }}-

      - name: Configure Kernel
        run: |
          echo "::group::Configure kernel"
          cd sm8550

          printf 'CONFIG_KSU=y\nCONFIG_TMPFS_XATTR=y\nCONFIG_TMPFS_POSIX_ACL=y\n' >> arch/arm64/configs/gki_defconfig

          if [ "${{ inputs.susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          fi

          if [ "${{ inputs.ksu_type }}" = "ReSukiSU-Manual" ]; then
            printf 'CONFIG_KSU_MANUAL_HOOK=y\nCONFIG_KSU_MANUAL_HOOK_AUTO_INPUT_HOOK=y\nCONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK=y\nCONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK=y\n' >> arch/arm64/configs/gki_defconfig
          fi

          if [ "${{ inputs.enable_lto }}" = "true" ]; then
            echo "CONFIG_LTO=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_THINLTO=y" >> arch/arm64/configs/gki_defconfig
          fi

          echo "Added config options:"
          grep -E "CONFIG_KSU|CONFIG_TMPFS|CONFIG_LTO" arch/arm64/configs/gki_defconfig || true
          echo "::endgroup::"

      - name: Build Kernel Defconfig
        run: |
          echo "::group::Build defconfig"
          cd sm8550
          make SCCACHE=1 ARCH=arm64 O=out \
              gki_defconfig \
              vendor/kalama_GKI.config \
              vendor/oplus/kalama_GKI.config \
              vendor/debugfs.config
          echo "::endgroup::"

      - name: Build Kernel Image
        id: build
        run: |
          echo "::group::Build kernel image"
          echo "Starting at $(date)"
          cd sm8550
          make -j$(nproc) SCCACHE=1 ARCH=arm64 O=out Image 2>&1 | tee build.log
          echo "Finished at $(date)"
          echo "::endgroup::"

      - name: Check build output
        run: |
          echo "::group::Verify build output"
          if [ -f sm8550/out/arch/arm64/boot/Image ]; then
            echo "::notice::Build successful!"
            ls -lh sm8550/out/arch/arm64/boot/Image
            echo "Image size: $(stat -c%s sm8550/out/arch/arm64/boot/Image) bytes"

            FILE_INFO=$(file sm8550/out/arch/arm64/boot/Image)
            echo "File type: $FILE_INFO"

            if echo "$FILE_INFO" | grep -q "kernel"; then
              echo "::notice::Valid kernel image confirmed"
            else
              echo "::warning::Unexpected file type"
            fi
          else
            echo "::error::Build failed: Image not found"
            if [ -f sm8550/build.log ]; then
              echo "Last 50 lines of build.log:"
              tail -50 sm8550/build.log
            fi
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.retry }}
          path: sm8550/build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Package AnyKernel3 Zip
        run: |
          echo "::group::Package AnyKernel3 Zip"
          git clone --depth=1 https://github.com/Kernel-SU/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git

          if [ -f "$GITHUB_WORKSPACE/sm8550/out/arch/arm64/boot/Image" ]; then
            cp "$GITHUB_WORKSPACE/sm8550/out/arch/arm64/boot/Image" "$GITHUB_WORKSPACE/AnyKernel3/Image"
          else
            echo "Error: Image file not found in any expected location"
            exit 1
          fi

          cd AnyKernel3
          if [ -f anykernel.sh ]; then
            sed -i "s/kernel.string=.*/kernel.string=OnePlus SM8550/" anykernel.sh
            sed -i "s/kernel.version=.*/kernel.version=${{ steps.kernel-commit.outputs.hash }}/" anykernel.sh
          fi
          echo "::endgroup::"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ inputs.susfs }}-${{ inputs.enable_lto }}-AnyKernel3
          path: ${{ github.workspace }}/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9

      - name: Show sccache stats
        run: |
          echo "::group::sccache stats"
          sccache --show-stats
          echo "::endgroup::"

      - name: Build summary
        run: |
          BUILD_STATUS="${{ job.status }}"
          if [ "$BUILD_STATUS" = "success" ]; then
            echo "## ✅ Build Summary" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Summary" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $BUILD_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel Source | ${{ inputs.kernel_source }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ inputs.kernel_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KSU Type | ${{ inputs.ksu_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | ${{ inputs.susfs }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LTO | ${{ inputs.enable_lto }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.kernel-commit.outputs.hash }}\` |" >> $GITHUB_STEP_SUMMARY

          if [ -f sm8550/out/arch/arm64/boot/Image ]; then
            echo "| Image Size | $(du -h sm8550/out/arch/arm64/boot/Image | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$BUILD_STATUS" = "success" ]; then
            echo "| Artifact | AnyKernel3.zip |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Build Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          echo "::group::Cleanup"
          rm -rf sm8550-modules
          rm -rf AnyKernel3
          rm -rf .sccache
          df -h /workspace 2>/dev/null || true
          echo "::endgroup::"

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.kernel_branch != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ github.run_id }}
          name: Kernel ${{ inputs.kernel_source }} ${{ inputs.ksu_type }} ${{ inputs.susfs }}
          draft: true
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        if: needs.build.result == 'failure'
        run: |
          echo "::notice::Build failed! Check workflow logs for details."
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
