name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 内核源码
        required: true
        type: choice
        options:
          - crdroidandroid
          - LineageOS
          - OnePlus12R-development
      kernel_branch:
        description: 内核源码分支
        required: false
        type: string
        default: ""
      ksu_type:
        description: KSU管理器
        required: true
        type: choice
        options:
          - None
          - KernelSU-Next
          - KowSU
          - ReSukiSU
          - ReSukiSU-Manual
      susfs:
        description: 启用SUSFS
        required: true
        type: boolean
        default: false

env:
  LLVM: 1
  LLVM_IAS: 1
  USE_SCCACHE: 1
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_STAT_SIZE: 1000000

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get build info
        id: build-info
        run: |
          echo "build_date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          echo "runner=$(hostname)" >> $GITHUB_OUTPUT
          echo "::notice::Build started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: bc bison build-essential cpio curl dwarves flex libssl-dev libelf-dev libdw-dev lz4 python3 git ccache patch unzip
          version: 1.0

      - name: Cache LLVM
        uses: actions/cache@v5
        with:
          path: |
            ~/llvm
          key: llvm-21.1-${{ runner.os }}
          restore-keys: |
            llvm-21.1-${{ runner.os }}
            llvm-21-

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21.1"

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 16384
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "SCCACHE_STAT_SIZE=1000000" >> $GITHUB_ENV
          echo "SCCACHE_WRAPPER_START_DELAY=3" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "SCCACHE=1" >> $GITHUB_ENV

      - name: Cache Git References
        uses: actions/cache@v5
        with:
          path: ~/.kernel-refs
          key: kernel-refs-${{ inputs.kernel_source }}-${{ inputs.kernel_branch }}
          restore-keys: |
            kernel-refs-${{ inputs.kernel_source }}-

      - name: Clone Kernel Source
        run: |
          echo "::group::Clone kernel source"
          mkdir -p sm8550 sm8550-modules
          mkdir -p ~/.kernel-refs/${{ inputs.kernel_source }}
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            --reference ~/.kernel-refs/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550 \
            --dissociate \
            "https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550.git" sm8550 || \
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            "https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550.git" sm8550
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" \
            "https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_sm8550-modules.git" sm8550-modules

          cd sm8550
          echo "Kernel commit: $(git log -1 --oneline)"
          echo "Kernel branch: $(git branch --show-current)"
          echo "::endgroup::"

      - name: Install KernelSU
        if: inputs.ksu_type != 'None'
        run: |
          echo "::group::Install KernelSU: ${{ inputs.ksu_type }}"
          cd sm8550
          case "${{ inputs.ksu_type }}" in
            KernelSU-Next)
              curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev_susfs/kernel/setup.sh | bash -s dev_susfs
              ;;
            KowSU)
              curl -LSs https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh | bash -s master
              ;;
            ReSukiSU)
              curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh | bash -s main
              ;;
            ReSukiSU-Manual)
              curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh | bash -s main
              if [ -f "${{ github.workspace }}/patches/resksu_manual_hooks.patch" ]; then
                cp "${{ github.workspace }}/patches/resksu_manual_hooks.patch" ./
                patch -p1 < resksu_manual_hooks.patch || echo "::warning::Patch apply failed"
              else
                echo "::warning::resksu_manual_hooks.patch not found"
              fi
              ;;
          esac
          echo "::endgroup::"

      - name: Install SUSFS
        if: inputs.susfs
        run: |
          echo "::group::Install SUSFS"
          cd sm8550
          git clone --depth=1 -b gki-android13-5.15 https://gitlab.com/simonpunk/susfs4ksu.git susfs
          cp susfs/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch ./
          cp susfs/kernel_patches/fs/* fs/
          cp susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_gki-android13-5.15.patch || echo "::warning::SUSFS patch may already applied"
          touch .scmversion
          rm -rf susfs
          echo "::endgroup::"

      - name: Get Kernel Commit
        id: kernel-commit
        run: |
          echo "hash=$(cd sm8550 && git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(cd sm8550 && git log -1 --format='%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Cache Build Output
        uses: actions/cache@v5
        with:
          path: sm8550/out
          key: kernel-out-${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ inputs.susfs }}-${{ steps.kernel-commit.outputs.hash }}
          restore-keys: |
            kernel-out-${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ inputs.susfs }}-
            kernel-out-${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-
            kernel-out-${{ inputs.kernel_source }}-

      - name: Configure Kernel
        run: |
          echo "::group::Configure kernel"
          cd sm8550

          printf 'CONFIG_KSU=y\nCONFIG_TMPFS_XATTR=y\nCONFIG_TMPFS_POSIX_ACL=y\n' >> arch/arm64/configs/gki_defconfig

          if [ "${{ inputs.susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          fi

          if [ "${{ inputs.ksu_type }}" = "ReSukiSU-Manual" ]; then
            printf 'CONFIG_KSU_MANUAL_HOOK=y\nCONFIG_KSU_MANUAL_HOOK_AUTO_INPUT_HOOK=y\nCONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK=y\nCONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK=y\n' >> arch/arm64/configs/gki_defconfig
          fi

          echo "Added config options:"
          grep -E "CONFIG_KSU|CONFIG_TMPFS" arch/arm64/configs/gki_defconfig
          echo "::endgroup::"

      - name: Build Kernel Defconfig
        run: |
          echo "::group::Build defconfig"
          cd sm8550
          make SCCACHE=1 ARCH=arm64 O=out \
              gki_defconfig \
              vendor/kalama_GKI.config \
              vendor/oplus/kalama_GKI.config \
              vendor/debugfs.config
          echo "::endgroup::"

      - name: Build Kernel Image
        run: |
          echo "::group::Build kernel image"
          echo "Starting at $(date)"
          cd sm8550
          make -j$(nproc) SCCACHE=1 ARCH=arm64 O=out Image 2>&1 | tee build.log
          echo "Finished at $(date)"
          echo "::endgroup::"

      - name: Check build output
        run: |
          echo "::group::Verify build output"
          if [ -f sm8550/out/arch/arm64/boot/Image ]; then
            echo "::notice::Build successful!"
            ls -lh sm8550/out/arch/arm64/boot/Image
            echo "Image size: $(stat -c%s sm8550/out/arch/arm64/boot/Image) bytes"
          else
            echo "::error::Build failed: Image not found"
            if [ -f sm8550/build.log ]; then
              echo "Last 50 lines of build.log:"
              tail -50 sm8550/build.log
            fi
            exit 1
          fi
          echo "::endgroup::"

      - name: Package AnyKernel3 Zip
        run: |
          echo "::group::Package AnyKernel3 Zip"
          git clone --depth=1 https://github.com/Kernel-SU/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git
          # Copy Image from normal build locations
          if [ -f "$GITHUB_WORKSPACE/sm8550/out/arch/arm64/boot/Image" ]; then
            cp "$GITHUB_WORKSPACE/sm8550/out/arch/arm64/boot/Image" "$GITHUB_WORKSPACE/AnyKernel3/Image"
          else
            echo "Error: Image file not found in any expected location"
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_source }}-${{ inputs.ksu_type }}-${{ inputs.susfs }}-AnyKernel3
          path: ${{ github.workspace }}/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9

      - name: Show sccache stats
        run: |
          echo "::group::sccache stats"
          sccache --show-stats
          echo "::endgroup::"

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel Source | ${{ inputs.kernel_source }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ inputs.kernel_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KSU Type | ${{ inputs.ksu_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | ${{ inputs.susfs }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AnyKernel3 | ${{ inputs.anykernel3 }} |" >> $GITHUB_STEP_SUMMARY

          if [ -f sm8550/out/arch/arm64/boot/Image ]; then
            echo "| Image Size | $(du -h sm8550/out/arch/arm64/boot/Image | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          fi

          if ls out/*.zip 1> /dev/null 2>&1; then
            echo "| Package | $(ls out/*.zip) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Build Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          echo "::group::Cleanup"
          rm -rf sm8550-modules
          rm -rf AnyKernel3
          df -h /workspace 2>/dev/null || true
          echo "::endgroup::"
